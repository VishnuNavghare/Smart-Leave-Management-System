<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
            Smart Leave
        </a>

        <div class="ms-auto">

            <span class="text-white me-3">

                Welcome,

                <strong>

                    {{ employee.first_name }} {{ employee.last_name }}

                </strong>

            </span>

            <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">
                Dashboard
            </a>

            <a href="{% url 'apply_leave' %}" class="btn btn-outline-light btn-sm">
                Apply Leave
            </a>

            <a href="{% url 'my_leave' %}" class="btn btn-outline-light btn-sm">
                My Leave
            </a>

            <a href="{% url 'profile' %}" class="btn btn-outline-light btn-sm">
                Profile
            </a>

            <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2 class="mb-4">
        Dashboard
    </h2>

    <div class="row">

        <div class="col-md-3">

            <div class="card shadow text-center">

                <div class="card-body">

                    <i class="bi bi-calendar-check display-4 text-primary"></i>

                    <h2>{{ total }}</h2>

                    <p>Total Leave</p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-warning shadow text-center">

                <div class="card-body">

                    <i class="bi bi-hourglass display-4"></i>

                    <h2>{{ pending }}</h2>

                    <p>Pending</p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-success text-white shadow text-center">

                <div class="card-body">

                    <i class="bi bi-check-circle display-4"></i>

                    <h2>{{ approved }}</h2>

                    <p>Approved</p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-danger text-white shadow text-center">

                <div class="card-body">

                    <i class="bi bi-x-circle display-4"></i>

                    <h2>{{ rejected }}</h2>

                    <p>Rejected</p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
